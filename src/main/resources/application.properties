spring.application.name=o2o-platform
server.port=${SERVER_PORT:9090}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/o2o_platform?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Aslaan0709S!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.thymeleaf.check-template-location=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.thymeleaf.cache=false

management.endpoints.web.exposure.include=health,info

security.jwt.secret=${JWT_SECRET:O2OPlatformJwtSecretKeyForHs256MustBeAtLeast32CharsLong}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}