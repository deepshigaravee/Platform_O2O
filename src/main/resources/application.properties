spring.application.name=o2o-platform

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/o2o_clothing_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Server port
server.port=8080
